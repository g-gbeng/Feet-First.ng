<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout - FeetFirst.ng</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
}

body {
  background: #ffffff;
  font-family: "Segoe UI", sans-serif;

  opacity: 0;
  transition: opacity .8s ease;
}

.gold-btn {
  background: var(--gold);
  color: #fff;
  border: none;
}

.gold-btn:hover {
  background: #b8962e;
}

.order-box {
  border: 1px solid #eee;
  padding: 20px;
  border-radius: 10px;
}

.item {
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}

/* ===============================
   FADE UP ANIMATION
================================ */
.fade-up{
    opacity:0;
    transform:translateY(30px);
    transition:
        opacity .8s ease,
        transform .8s ease;
}

.fade-up.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<div class="container my-5 fade-up">
  <h3 class="text-center mb-4">Checkout</h3>

  <div class="order-box">

    <!-- Customer Details -->
    <h5>Customer Details</h5>

    <!-- NAME FIELD (NOW MANUAL INPUT) -->
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" id="name" class="form-control" placeholder="Enter your full name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone Number</label>
      <input type="text" id="phone" class="form-control" placeholder="Enter your phone number" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Delivery Address</label>
      <textarea id="address" class="form-control" rows="3" placeholder="Enter delivery address" required></textarea>
    </div>

    <hr>

    <!-- Order Summary -->
    <h5>Order Summary</h5>
    <div id="orderSummary"></div>

    <hr>

    <h4>Total: ₦<span id="orderTotal">0</span></h4>

    <button class="btn gold-btn w-100 mt-3" onclick="placeOrder()">
      Place Order on WhatsApp
    </button>

  </div>
</div>

<script>
function getUserId() {
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "/login.html";
    return null;
  }
  return JSON.parse(atob(token.split(".")[1])).id;
}

const userId = getUserId();
const CART_KEY = `cart_${userId}`;

let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];

const orderSummary = document.getElementById("orderSummary");
const orderTotal = document.getElementById("orderTotal");

function renderCheckout() {
  orderSummary.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    orderSummary.innerHTML = "<p class='text-muted'>Your cart is empty.</p>";
    orderTotal.innerText = "0";
    return;
  }

  cart.forEach(item => {
    total += item.price * item.qty;

    orderSummary.innerHTML += `
      <div class="item">
        <strong>${item.name}</strong><br>
        Size: ${item.size}<br>
        Qty: ${item.qty}<br>
        ₦${(item.price * item.qty).toLocaleString()}
      </div>
    `;
  });

  orderTotal.innerText = total.toLocaleString();
}

function generateOrderId() {
  return "FFNG-" + Date.now() + "-" + Math.floor(Math.random() * 1000);
}

async function placeOrder() {

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();

  if (!name || !phone || !address) {
    alert("Please fill in all fields.");
    return;
  }

  if (cart.length === 0) {
    alert("Your cart is empty.");
    return;
  }

  const orderId = generateOrderId();
  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

  try {
    const res = await fetch("/api/orders", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${localStorage.getItem("token")}`
      },
      body: JSON.stringify({
        orderId,
        name,
        phone,
        address,
        items: cart,
        total,
        status: "pending"
      })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.message || "Order failed");
    }

  } catch (err) {
    alert("Order failed: " + err.message);
    return;
  }

  // Clear cart ONLY after successful order
  localStorage.removeItem(CART_KEY);

  // WhatsApp message
  let message = `Hi FeetFirst \n\n`;
  message += ` *Order ID:* ${orderId}\n`;
  message += ` *Name:* ${name}\n`;
  message += ` *Phone:* ${phone}\n`;
  message += ` *Address:* ${address}\n\n`;
  message += ` *Order Details:*\n`;

  cart.forEach(item => {
    message += `- ${item.name} (Size ${item.size}) ×${item.qty} — ₦${(item.price * item.qty).toLocaleString()}\n`;
  });

  message += `\n *Total:* ₦${total.toLocaleString()}\n`;

  const WHATSAPP_NUMBER = "2348144863093";

  const whatsappURL =
    `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;

  window.location.href = whatsappURL;
}

renderCheckout();
window.addEventListener("load", () => {

    document.body.style.opacity = "1";

    document.querySelector(".fade-up").classList.add("show");

});
</script>

</body>
</html>
