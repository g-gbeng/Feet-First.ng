<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Saved Items</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
}

body {
  background: #fff;
  font-family: "Segoe UI", sans-serif;


/* ==========================
   PAGE FADE IN
========================== */
    opacity:0;
    transform:translateY(12px);
    transition:
        opacity .7s ease,
        transform .7s ease;
}

body.loaded{
    opacity:1;
    transform:translateY(0);
}

/* ===== TOP BAR ===== */
.top-bar {
  position: sticky;
  top: 0;
  background: white;
  border-bottom: 1px solid #eee;
  z-index: 1000;
}

.icon-btn {
  position: relative;
  cursor: pointer;
  font-size: 20px;
}

.badge-count {
  position: absolute;
  top: -6px;
  right: -8px;
  background: var(--gold);
  color: white;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 50%;
}

/* ===== FAVORITE ITEM ===== */
.saved-item {
  border-bottom: 1px solid #eee;
  padding: 15px 0;
}

.price {
  color: var(--gold);
  font-weight: 600;
}

/* ===== BUTTONS ===== */
.btn-gold {
  background: var(--gold);
  color: white;
  border: none;
}

.btn-gold:hover {
  background: #b8962e;
}

.btn-outline-gold {
  border: 1px solid var(--gold);
  color: var(--gold);
}

/* FORCE SIDE-BY-SIDE ON ALL MOBILE */
.action-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
}

.action-buttons button {
  flex: 1;
  white-space: nowrap;
}

/* MOBILE IMAGE SCALE */
@media (max-width: 576px) {
  .saved-item {
    flex-direction: column;
    align-items: flex-start !important;
  }

  .saved-item img {
    width: 100%;
    max-width: 480px;
    margin-bottom: 10px;
  }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar py-3">
  <div class="container d-flex justify-content-end gap-4">
    <div class="icon-btn" onclick="goToFavorites()">
      ❤️ <span class="badge-count" id="favCount">0</span>
    </div>
    <div class="icon-btn" onclick="goToCart()">
      🛒 <span class="badge-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<!-- CONTENT -->
<div class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3 class="m-0">Saved Items</h3>

        <button
            class="btn btn-outline-danger"
            id="clearFavoritesBtn"
            onclick="clearFavorites()"
        >
            Clear Favorites
        </button>

    </div>

    <div id="favoritesList"></div>

</div>

<!-- Size Selection Modal -->
<div class="modal fade" id="sizeModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Select Shoe Size</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <p id="selectedProductName" class="fw-bold"></p>

        <select class="form-select" id="selectedSize">
          <option value="">Choose Size</option>
        </select>

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          Cancel
        </button>

        <button
          class="btn btn-gold"
          onclick="confirmMoveToCart()"
        >
          Add to Cart
        </button>

      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function getUserId() {
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "/login.html";
        return null;
    }

    return JSON.parse(atob(token.split(".")[1])).id;
}

const userId = getUserId();

const CART_KEY = `cart_${userId}`;
const FAV_KEY = `fav_${userId}`;

let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
let favorites = JSON.parse(localStorage.getItem(FAV_KEY)) || [];

let selectedFavoriteIndex = null;
let latestProduct = null;

const sizeModal = new bootstrap.Modal(
    document.getElementById("sizeModal")
);

/* ------------------------------
BADGES
------------------------------ */

function updateBadges() {

    document.getElementById("cartCount").innerText =
        cart.reduce((sum, item) => sum + item.qty, 0);

    document.getElementById("favCount").innerText =
        favorites.length;

}

/* ------------------------------
RENDER FAVORITES
------------------------------ */

function renderFavorites() {

    const container =
        document.getElementById("favoritesList");

    container.innerHTML = "";

    const clearBtn =
    document.getElementById("clearFavoritesBtn");

    if (!favorites.length) {

        container.innerHTML =
        "<p class='text-center text-muted'>You have no saved items.</p>";
        clearBtn.disabled = true;
        return;
    }

    clearBtn.disabled = false;

    favorites.forEach((item,index)=>{

        container.innerHTML += `

        <div class="saved-item d-flex align-items-center gap-3">

            <img
                src="/images/${item.image}"
                width="80"
            >

            <div class="flex-grow-1">

                <strong>${item.name}</strong><br>

                <span class="price">
                    ₦${item.price.toLocaleString()}
                </span>

            </div>

            <div class="action-buttons">

                <button
                    class="btn btn-sm btn-gold"
                    onclick="moveToCart(${index})"
                >
                    Add to Cart
                </button>

                <button
                    class="btn btn-sm btn-outline-danger"
                    onclick="removeFavorite(${index})"
                >
                    Remove
                </button>

            </div>

        </div>

        `;

    });

}

/* ------------------------------
FETCH LATEST PRODUCT
------------------------------ */

async function moveToCart(index){

    selectedFavoriteIndex = index;

    const favourite = favorites[index];

    try{

        const res = await fetch(`/api/products/${favourite._id}`);

        if(!res.ok){

            alert("Unable to load latest product.");

            return;

        }

        latestProduct = await res.json();

        if(!latestProduct.inStock){

            alert("This product is currently out of stock.");

            return;

        }

        document.getElementById(
            "selectedProductName"
        ).innerText = latestProduct.name;

        const select =
            document.getElementById("selectedSize");

        select.innerHTML =
            '<option value="">Choose Size</option>';

        if(
            !latestProduct.sizes ||
            latestProduct.sizes.length===0
        ){

            alert("No sizes available.");

            return;

        }

        latestProduct.sizes.forEach(size=>{

            select.innerHTML +=
            `<option value="${size}">
                ${size}
            </option>`;

        });

        select.value="";

        sizeModal.show();

    }

    catch(error){

        console.error(error);

        alert("Unable to load product.");

    }

}

/* ------------------------------
CONFIRM ADD TO CART
------------------------------ */

function confirmMoveToCart(){

    const size =
        document.getElementById("selectedSize").value;

    if(!size){

        alert("Please select a size.");

        return;

    }

    const existing = cart.find(item=>

        item._id===latestProduct._id &&
        item.size===size

    );

    if(existing){

        existing.qty++;

    }

    else{

        cart.push({

            ...latestProduct,

            size,

            qty:1

        });

    }

    favorites.splice(selectedFavoriteIndex,1);

    localStorage.setItem(
        CART_KEY,
        JSON.stringify(cart)
    );

    localStorage.setItem(
        FAV_KEY,
        JSON.stringify(favorites)
    );

    sizeModal.hide();

    updateBadges();

    renderFavorites();

}

/* ------------------------------
REMOVE FAVORITE
------------------------------ */

function removeFavorite(index){

    favorites.splice(index,1);

    localStorage.setItem(
        FAV_KEY,
        JSON.stringify(favorites)
    );

    updateBadges();

    renderFavorites();

}

function clearFavorites(){

    if(!favorites.length){

        alert("You have no saved items.");

        return;

    }

    if(!confirm("Clear all saved items?")){

        return;

    }

    favorites = [];

    localStorage.setItem(
        FAV_KEY,
        JSON.stringify(favorites)
    );

    updateBadges();

    renderFavorites();

}

/* ------------------------------
NAVIGATION
------------------------------ */

function goToCart(){

    window.location.href="/cart.html";

}

function goToFavorites(){

    window.location.href="/favorites.html";

}

/* ------------------------------
INITIALIZE
------------------------------ */

updateBadges();

renderFavorites();

window.addEventListener("load", () => {
    document.body.classList.add("loaded");
});

</script>
