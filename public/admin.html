<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
    :root{
      --gold:#d4af37;
    }

    .dashboard-header{
      text-align:center;
      margin-bottom:20px;
    }

    .btn-gold{
      background:var(--gold);
      color:#fff;
      border:none;
      font-weight:600;
    }

    .btn-gold:hover{
      background:#b8962e;
      color:#fff;
    }

    .email-card{
      border-radius:10px;
      box-shadow:0 5px 20px rgba(0,0,0,0.05);
    }
  </style>
</head>

<body class="container mt-4">

<!-- HEADER -->

<div class="dashboard-header">
  <h2>Admin Dashboard</h2>

  <button class="btn btn-dark mt-2" onclick="adminLogout()">
    Logout
  </button>
</div>

<!-- ================= STATS SECTION ================= -->

<div class="row mt-4">

  <div class="col-md-4">
    <div class="card p-3">
      <h5>Total Users</h5>
      <h3 id="totalUsers">0</h3>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3">
      <h5>Total Completed Orders</h5>
      <h3 id="totalOrders">0</h3>
    </div>
  </div>

  <div class="col-md-4">
    <div class="card p-3">
      <h5>Total Revenue</h5>
      <h3 id="totalRevenue">₦0</h3>
    </div>
  </div>

</div>

<!-- ================= USERS SECTION ================= -->

<hr>

<h4>Registered Users</h4>

<input
type="text"
id="userSearch"
class="form-control mb-2"
placeholder="Search users..."
>

<table class="table table-bordered">
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Email</th>
<th>Action</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>

<!-- ================= EMAIL SECTION ================= -->

<hr>

<h4>Send Email</h4>

<div class="card p-4 email-card">

<div class="form-group">
<label>To (Email)</label>
<input
type="email"
id="emailTo"
class="form-control"
placeholder="Enter email address"
>
</div>

<div class="form-group">
<label>Subject</label>
<input
type="text"
id="emailSubject"
class="form-control"
>
</div>

<div class="form-group">
<label>Message</label>
<textarea
id="emailMessage"
class="form-control"
rows="4"
></textarea>
</div>

<button
class="btn btn-gold"
onclick="sendEmail()"
>
Send Email
</button>

</div>

<!-- ================= ORDERS SECTION ================= -->

<hr>

<h4>Orders</h4>

<input
type="text"
id="orderSearch"
class="form-control mb-2"
placeholder="Search orders by ID, name or email..."
>

<h5>Pending Orders</h5>

<table class="table table-bordered">

<thead>
<tr>
<th>Order ID</th>
<th>User</th>
<th>Email</th>
<th>Items</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>

<tbody id="pendingOrders"></tbody>

</table>

<h5>Completed Orders</h5>

<table class="table table-bordered">

<thead>
<tr>
<th>Order ID</th>
<th>User</th>
<th>Email</th>
<th>Items</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>

<tbody id="completedOrders"></tbody>

</table>

<script>

const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
window.location.href="/admin-login.html";
}

function adminLogout(){
localStorage.removeItem("adminToken");
window.location.href="/admin-login.html";
}

const formatNaira=(amount)=>{
return new Intl.NumberFormat('en-NG',{
style:'currency',
currency:'NGN'
}).format(amount||0);
};

let users=[];
let orders=[];

async function loadDashboard(){

try{

const res=await fetch('/api/admin/dashboard',{
headers:{
Authorization:`Bearer ${adminToken}`
}
});

if(!res.ok){
adminLogout();
return;
}

const data=await res.json();

users=data.users;
orders=data.orders;

renderUsers(users);
renderOrders(orders);

document.getElementById('totalUsers').textContent=users.length;

const completedCount=orders.filter(o=>o.status==="completed").length;

document.getElementById('totalOrders').textContent=completedCount;

document.getElementById('totalRevenue').textContent=
formatNaira(data.totalRevenue);

}catch(err){
console.error(err);
}

}

function renderUsers(list){

const tbody=document.getElementById('usersTable');

tbody.innerHTML='';

list.forEach((user,i)=>{

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${user.name}</td>
<td>${user.email}</td>
<td>-</td>
</tr>
`;

});

}

function renderOrders(list){

const pending=document.getElementById('pendingOrders');
const completed=document.getElementById('completedOrders');

pending.innerHTML='';
completed.innerHTML='';

list.forEach((order)=>{

const row=`

<tr>

<td>${order.orderId||order._id}</td>

<td>${order.user?.name||"N/A"}</td>

<td>${order.user?.email||"N/A"}</td>

<td>${order.items.map(item=>item.name||"Item").join(', ')}</td>

<td>${formatNaira(order.total)}</td>

<td>

<div class="d-flex flex-nowrap align-items-center">

${order.status === "pending" ? `
<button
class="btn btn-sm btn-success mr-2"
onclick="markCompleted('${order._id}')"
>
Completed
</button>
` : ''}

<button
class="btn btn-sm btn-danger"
onclick="deleteOrder('${order._id}')"
>
Delete
</button>

</div>

</td>

</tr>

`;

if(order.status==="pending"){
pending.innerHTML+=row;
}else{
completed.innerHTML+=row;
}

});

}

async function markCompleted(id){

if(!confirm("Mark this order as completed?")) return;

await fetch(`/api/admin/orders/${id}/complete`,{
method:"PUT",
headers:{
Authorization:`Bearer ${adminToken}`
}
});

loadDashboard();

}

async function deleteOrder(id){

if(!confirm("Are you sure you want to delete this order?")) return;

await fetch(`/api/admin/orders/${id}`,{
method:"DELETE",
headers:{
Authorization:`Bearer ${adminToken}`
}
});

loadDashboard();

}

document.getElementById('userSearch').addEventListener('input',(e)=>{

const value=e.target.value.toLowerCase();

renderUsers(

users.filter(u=>

u.name.toLowerCase().includes(value)||
u.email.toLowerCase().includes(value)

)

);

});

document.getElementById('orderSearch').addEventListener('input',(e)=>{

const value=e.target.value.toLowerCase();

renderOrders(

orders.filter(o=>

(o.orderId&&o.orderId.toLowerCase().includes(value))||

(o.user?.name&&o.user.name.toLowerCase().includes(value))||

(o.user?.email&&o.user.email.toLowerCase().includes(value))

)

);

});

async function sendEmail(){

try{

const res=await fetch('/api/admin/send-email',{

method:'POST',

headers:{
'Content-Type':'application/json',
Authorization:`Bearer ${adminToken}`
},

body:JSON.stringify({

to:document.getElementById('emailTo').value,
subject:document.getElementById('emailSubject').value,
message:document.getElementById('emailMessage').value

})

});

const data=await res.json();

if(!res.ok){
alert(data.message||"Email failed");
return;
}

alert("Email sent successfully");

}catch(err){

alert("Something went wrong");

}

}

loadDashboard();

</script>

</body>
</html>
