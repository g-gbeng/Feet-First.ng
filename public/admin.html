<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <style>
:root{
    --gold:#d4af37;
    --gold-dark:#b8962e;
    --bg:#f8f8f8;
    --white:#fff;
}

body{
    background:var(--bg);
    font-family:"Segoe UI",sans-serif;
    opacity:0;
    transition:opacity .7s ease;
}

/* ===============================
PAGE ANIMATION
=============================== */

.fade-up{
    opacity:0;
    transform:translateY(25px);
    transition:.7s ease;
}

.fade-up.show{
    opacity:1;
    transform:translateY(0);
}

/* ===============================
HEADER
=============================== */

.dashboard-header{
    text-align:center;
    margin-bottom:35px;
}

.dashboard-header h2{
    font-weight:700;
}

.btn-gold{
    background:var(--gold);
    color:#fff;
    border:none;
    font-weight:600;
}

.btn-gold:hover{
    background:var(--gold-dark);
    color:#fff;
}

.btn-outline-gold{
    border:1px solid var(--gold);
    color:var(--gold);
}

.btn-outline-gold:hover{
    background:var(--gold);
    color:#fff;
}

/* ===============================
CARDS
=============================== */

.dashboard-card{
    background:#fff;
    border:none;
    border-radius:16px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
    transition:.3s;
    height:100%;
}

.dashboard-card:hover{
    transform:translateY(-4px);
}

.stat-title{
    color:#888;
    font-size:.9rem;
}

.stat-value{
    font-size:2rem;
    font-weight:700;
    color:var(--gold);
}

/* ===============================
SECTION CARDS
=============================== */

.section-card{
    background:#fff;
    border-radius:18px;
    padding:25px;
    margin-top:25px;
    box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.section-title{
    font-weight:700;
    margin-bottom:20px;
}

/* ===============================
TABLES
=============================== */

.table thead{
    background:#111;
    color:#fff;
}

.table td,
.table th{
    vertical-align:middle;
}

/* ===============================
SEARCH
=============================== */

.form-control{
    border-radius:10px;
}

/* ===============================
RESPONSIVE
=============================== */

@media(max-width:991px){

    .stats-row>div{
        margin-bottom:20px;
    }

}
</style>
</head>

<body class="container mt-4">

<!-- HEADER -->

<div class="dashboard-header">
  <h2>Admin Dashboard</h2>

  <button class="btn btn-dark mt-2" onclick="adminLogout()">
    Logout
  </button>
</div>

<!-- ================= STATS SECTION ================= -->

<div class="row stats-row fade-up">

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="dashboard-card p-4">

            <div class="stat-title">
                Total Users
            </div>

            <div
            class="stat-value"
            id="totalUsers">
            0
            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="dashboard-card p-4">

            <div class="stat-title">
                Pending Orders
            </div>

            <div
            class="stat-value"
            id="pendingCount">
            0
            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="dashboard-card p-4">

            <div class="stat-title">
                Completed Orders
            </div>

            <div
            class="stat-value"
            id="totalOrders">
            0
            </div>

        </div>

    </div>

    <div class="col-lg-3 col-md-6 mb-3">

        <div class="dashboard-card p-4">

            <div class="stat-title">
                Revenue
            </div>

            <div
            class="stat-value"
            id="totalRevenue">
            ₦0
            </div>

        </div>

    </div>

</div>

<div class="row mt-4 fade-up">

    <!-- USERS -->

    <div class="col-lg-6 mb-4">

        <div class="section-card">

            <h4 class="section-title">
                Registered Users
            </h4>

            <input
            id="userSearch"
            class="form-control mb-3"
            placeholder="Search users...">

            <div class="table-responsive">

                <table class="table table-bordered">

                    <thead>

                    <tr>

                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Orders</th>

                    </tr>

                    </thead>

                    <tbody id="usersTable"></tbody>

                </table>

            </div>

        </div>

    </div>

    <!-- EMAIL -->

    <div class="col-lg-6 mb-4">

        <div class="section-card">

            <h4 class="section-title">
                Send Email
            </h4>

            <div class="form-group">

                <label>Recipient</label>

                <input
                list="emailSuggestions"
                id="emailTo"
                class="form-control"
                placeholder="Search email or select">

                <datalist id="emailSuggestions">

                </datalist>

            </div>

            <div class="form-group">

                <label>Subject</label>

                <input
                id="emailSubject"
                class="form-control">

            </div>

            <div class="form-group">

                <label>Message</label>

                <textarea
                id="emailMessage"
                rows="5"
                class="form-control"></textarea>

            </div>

            <button
            class="btn btn-gold btn-block"
            onclick="sendEmail()">

                Send Email

            </button>

        </div>

    </div>

</div>
<!-- ================= ORDERS SECTION ================= -->

<div class="section-card fade-up">

    <h3 class="section-title">
        Orders
    </h3>

    <input
        type="text"
        id="orderSearch"
        class="form-control mb-4"
        placeholder="Search by Order ID, customer or email..."
    >

    <div class="row">

        <!-- Pending -->

        <div class="col-lg-6 mb-4">

            <h5 class="mb-3">

                Pending Orders

                <span
                    id="pendingBadge"
                    class="badge badge-warning ml-2"
                >
                    0
                </span>

            </h5>

            <div class="table-responsive">

                <table class="table table-hover">

                    <thead>

                    <tr>

                        <th>ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                    </thead>

                    <tbody id="pendingOrders"></tbody>

                </table>

            </div>

        </div>

        <!-- Completed -->

        <div class="col-lg-6 mb-4">

            <h5 class="mb-3">

                Completed Orders

                <span
                    id="completedBadge"
                    class="badge badge-success ml-2"
                >
                    0
                </span>

            </h5>

            <div class="table-responsive">

                <table class="table table-hover">

                    <thead>

                    <tr>

                        <th>ID</th>
                        <th>Customer</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                    </thead>

                    <tbody id="completedOrders"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>
<script>

const adminToken = localStorage.getItem("adminToken");

if(!adminToken){
window.location.href="/admin-login.html";
}

function adminLogout(){
localStorage.removeItem("adminToken");
window.location.href="/admin-login.html";
}

const formatNaira=(amount)=>{
return new Intl.NumberFormat('en-NG',{
style:'currency',
currency:'NGN'
}).format(amount||0);
};

let users=[];
let orders=[];
document.body.style.opacity = "0";

async function loadDashboard(){

try{

const res=await fetch('/api/admin/dashboard',{
headers:{
Authorization:`Bearer ${adminToken}`
}
});

if(!res.ok){
adminLogout();
return;
}

const data=await res.json();
document.body.style.opacity="1";

users=data.users;
orders=data.orders;

renderUsers(users);
renderOrders(orders);

document.getElementById("totalUsers").textContent = users.length;

const completedCount =
    orders.filter(o => o.status === "completed").length;

const pendingCount =
    orders.filter(o => o.status === "pending").length;

document.getElementById("pendingCount").textContent =
    pendingCount;

document.getElementById("totalOrders").textContent =
    completedCount;

document.getElementById("totalRevenue").textContent =
    formatNaira(data.totalRevenue);

populateEmailSuggestions();

}catch(err){
console.error(err);
}

}

function renderUsers(list){

    const tbody =
        document.getElementById("usersTable");

    tbody.innerHTML = "";

    list.forEach((user,index)=>{

        const orderCount =
            orders.filter(order =>

                order.user &&
                order.user._id === user._id

            ).length;

        tbody.innerHTML += `

        <tr>

            <td>${index+1}</td>

            <td>${user.name}</td>

            <td>${user.email}</td>

            <td>

                <span class="badge badge-warning">

                    ${orderCount}

                </span>

            </td>

        </tr>

        `;

    });

}

function populateEmailSuggestions(){

    const list =
        document.getElementById("emailSuggestions");

    list.innerHTML="";

    list.innerHTML += `
        <option value="ALL USERS">
    `;

    users.forEach(user=>{

        list.innerHTML += `
            <option value="${user.email}">
        `;

    });

}

function renderOrders(list){

    const pending =
        document.getElementById("pendingOrders");

    const completed =
        document.getElementById("completedOrders");

    pending.innerHTML = "";
    completed.innerHTML = "";

    let pendingCount = 0;
    let completedCount = 0;

    list.forEach(order=>{

        const statusBadge =
            order.status==="completed"

            ?

            `<span class="badge badge-success">
                Completed
            </span>`

            :

            `<span class="badge badge-warning">
                Pending
            </span>`;

        const row = `

        <tr>

            <td>
                ${order.orderId||order._id}
            </td>

            <td>

                <strong>

                    ${order.user?.name||"Unknown"}

                </strong>

                <br>

                <small class="text-muted">

                    ${order.user?.email||""}

                </small>

            </td>

            <td>

                ${formatNaira(order.total)}

            </td>

            <td>

                ${statusBadge}

            </td>

            <td>

                <div class="d-flex">

                ${
                    order.status==="pending"

                    ?

                    `

                    <button
                        class="btn btn-sm btn-gold mr-2"
                        onclick="markCompleted('${order._id}')">

                        ✓

                    </button>

                    `

                    :

                    ""

                }

                <button
                    class="btn btn-sm btn-outline-gold"
                    onclick="deleteOrder('${order._id}')">

                    ✕

                </button>

                </div>

            </td>

        </tr>

        `;

        if(order.status==="pending"){

            pending.innerHTML += row;

            pendingCount++;

        }

        else{

            completed.innerHTML += row;

            completedCount++;

        }

    });

    if(!pendingCount){

        pending.innerHTML=`

        <tr>

        <td colspan="5" class="text-center text-muted">

        No pending orders

        </td>

        </tr>

        `;

    }

    if(!completedCount){

        completed.innerHTML=`

        <tr>

        <td colspan="5" class="text-center text-muted">

        No completed orders

        </td>

        </tr>

        `;

    }

    document.getElementById("pendingBadge").textContent =
        pendingCount;

    document.getElementById("completedBadge").textContent =
        completedCount;

}

async function markCompleted(id){

if(
!window.confirm(
"Mark this order as completed?"
)
) return;

await fetch(`/api/admin/orders/${id}/complete`,{
method:"PUT",
headers:{
Authorization:`Bearer ${adminToken}`
}
});

await loadDashboard();

}

async function deleteOrder(id){

if(
!window.confirm(
"Delete this order permanently?"
)
) return;

await fetch(`/api/admin/orders/${id}`,{
method:"DELETE",
headers:{
Authorization:`Bearer ${adminToken}`
}
});

await loadDashboard();

}

document.getElementById('userSearch').addEventListener('input',(e)=>{

const value=e.target.value.toLowerCase();

renderUsers(

users.filter(u=>

u.name.toLowerCase().includes(value)||
u.email.toLowerCase().includes(value)

)

);

});

document.getElementById("orderSearch")
.addEventListener("input",(e)=>{

    const value =
        e.target.value.toLowerCase().trim();

    renderOrders(

        orders.filter(order=>{

            return(

                (order.orderId||"")
                .toLowerCase()
                .includes(value)

                ||

                (order.user?.name||"")
                .toLowerCase()
                .includes(value)

                ||

                (order.user?.email||"")
                .toLowerCase()
                .includes(value)

            );

        })

    );

});
async function sendEmail() {

    const recipient =
        document.getElementById("emailTo").value.trim();

    const subject =
        document.getElementById("emailSubject").value.trim();

    const message =
        document.getElementById("emailMessage").value.trim();

    if (!recipient || !subject || !message) {

        alert("Please complete all fields.");

        return;

    }

    let to = recipient;

    // Send to everyone
    if (recipient.toUpperCase() === "ALL USERS") {

        to = users.map(user => user.email);

        if (!to.length) {

            alert("No users found.");

            return;

        }

    }

    const button = document.querySelector(
        ".btn-gold.btn-block"
    );

    const originalText = button.innerHTML;

    button.disabled = true;
    button.innerHTML = "Sending...";

    try {

        const res = await fetch("/api/admin/send-email", {

            method: "POST",

            headers: {

                "Content-Type": "application/json",

                Authorization: `Bearer ${adminToken}`

            },

            body: JSON.stringify({

                to,
                subject,
                message

            })

        });

        const data = await res.json();

        if (!res.ok) {

            throw new Error(
                data.message || "Unable to send email."
            );

        }

        alert("Email sent successfully.");

        document.getElementById("emailTo").value = "";
        document.getElementById("emailSubject").value = "";
        document.getElementById("emailMessage").value = "";

    }
    catch (err) {

        console.error(err);

        alert(err.message);

    }
    finally {

        button.disabled = false;
        button.innerHTML = originalText;

    }

}


window.addEventListener("load", () => {

    document.body.style.opacity = "1";

    document.querySelectorAll(".fade-up").forEach((el, i) => {

        setTimeout(() => {

            el.classList.add("show");

        }, i * 120);

    });

});


window.addEventListener("load",async()=>{

    document.body.style.opacity="1";

    document
        .querySelectorAll(".fade-up")
        .forEach((card,index)=>{

            setTimeout(()=>{

                card.classList.add("show");

            },index*120);

        });

    await loadDashboard();

});

</script>

</body>
</html>
